name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g. 0.1.0)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Update manifest.json version
        run: |
          jq --arg v "${{ inputs.version }}" '.package_version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
          else
            LOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          {
            echo "changelog<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          ZIP_NAME="duke_nukem_3d_ap_tracker_${{ inputs.version }}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            versions.json \
            items/ \
            locations/ \
            layouts/ \
            maps/ \
            images/ \
            scripts/
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Prepend entry to versions.json
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          SHA=$(sha256sum "$ZIP_NAME" | awk '{print $1}')
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/${ZIP_NAME}"
          CHANGELOG_JSON=$(printf '%s' "$CHANGELOG" | jq -R -s 'split("\n") | map(ltrimstr("- ")) | map(select(. != ""))')
          jq --arg v "${{ inputs.version }}" \
             --arg url "$DOWNLOAD_URL" \
             --arg sha "$SHA" \
             --argjson cl "$CHANGELOG_JSON" \
             '.versions = [{package_version: $v, download_url: $url, sha256: $sha, changelog: $cl}] + (.versions // [])' \
             versions.json > versions.tmp && mv versions.tmp versions.json

      - name: Commit version bumps, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json
          if git diff --staged --quiet; then
            echo "No changes to manifest.json / versions.json, skipping commit"
          else
            git commit -m "chore: release v${{ inputs.version }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}
          files: |
            ${{ env.ZIP_NAME }}
            versions.json
